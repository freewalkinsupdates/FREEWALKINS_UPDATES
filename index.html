<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreeWalkins V17 Professional HR Message</title>

<!-- Inter Font for Premium Look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #10b981;
  --primary-hover: #059669;
  --primary-light: rgba(16, 185, 129, 0.1);
  --whatsapp: #22c55e;
  --whatsapp-hover: #16a34a;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-lg: 16px;
  --radius-md: 12px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: 'Inter', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  padding: 12px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden; /* Prevents unwanted horizontal scrolling on mobile */
}

.wrapper{
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
}

/* Premium Gradient Header */
.header{
  background: linear-gradient(135deg, #059669 0%, #10b981 100%);
  color: #fff;
  padding: 24px 16px;
  border-radius: var(--radius-lg);
  text-align: center;
  margin-bottom: 16px;
  box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.25);
  position: relative;
  overflow: hidden;
}

.header h1{
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.04em;
}

.header p{
  font-size: 13px;
  opacity: 0.9;
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Fluid Mobile Filter Box */
.filter-box {
  background: var(--bg-card);
  padding: 14px;
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.filter-box-row {
  display: grid;
  grid-template-columns: 1fr; /* Stacks seamlessly on small screens */
  gap: 10px;
}

@media (min-width: 400px) {
  .filter-box-row {
    grid-template-columns: 1fr 1fr; /* Side-by-side on larger mobile viewports */
  }
}

/* Native-feeling UI Fields */
input, select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 15px;
  color: var(--text-main);
  background-color: var(--bg-card);
  transition: var(--transition);
  outline: none;
  -webkit-appearance: none; /* Modern look for iOS select drops */
}

input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

/* Job Cards UI Optimization */
.job-card{
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
  border: 1px solid var(--border);
}

.job-card h3{
  font-size: 18px;
  color: var(--text-main);
  margin-bottom: 4px;
  font-weight: 600;
}

.job-card .company-name {
  font-size: 14px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
}

/* Grid adapted perfectly to mobile widths without squeezing text */
.job-details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

@media (max-width: 350px) {
  .job-details-grid {
    grid-template-columns: 1fr; /* Single column on ultra-narrow phones */
  }
}

.detail-badge {
  background: var(--bg-main);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Responsive Action Buttons */
button {
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  gap: 6px;
  transition: transform 0.1s ease;
}

button:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-whatsapp {
  background: var(--whatsapp);
  color: #fff;
}
.btn-danger {
  background: rgba(239, 68, 68, 0.1);
  color: var(--danger);
}

/* Fixed Mobile Overlap Fit Solution */
.container{
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: 94%;
  max-width: 480px;
  max-height: 90vh; /* Keeps space clear at top/bottom of viewports */
  overflow-y: auto; /* Scrollable inside if height grows */
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 16px;
  z-index: 1000;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
  border: 1px solid var(--border);
  transition: var(--transition);
}

.container.active {
  transform: translate(-50%, -50%) scale(1);
}

.container h2 {
  font-size: 18px;
  font-weight: 700;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 12px;
}

@media (min-width: 450px) {
  .form-grid { grid-template-columns: 1fr 1fr; }
  .full-width { grid-column: span 2; }
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
}

#appliedFor{
  background: var(--bg-main);
  font-weight: 600;
  color: var(--primary);
}

/* Overlay Layer Blur */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(4px);
  z-index: 999;
}

/* Status Notifications Popups */
.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(4px);
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding: 12px;
}

.popup-content{
  background: var(--bg-card);
  padding: 20px;
  border-radius: var(--radius-lg);
  text-align: center;
  width: 100%;
  max-width: 320px;
  border: 1px solid var(--border);
}

/* Spinner component */
.loader {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin{ to{transform:rotate(360deg);} }
</style>
</head>

<body>

<div class="modal-overlay" id="modalOverlay" onclick="closeForm()"></div>

<div class="wrapper">

  <div class="header">
    <h1>FreeWalkins by VenuHR</h1>
    <p>Job Updates • Apply Online</p>
  </div>

  <div class="filter-box">
    <input id="searchInput" placeholder="🔍 Search profiles or companies..." oninput="renderJobs()">
    <div class="filter-box-row">
      <select id="jobFilter" onchange="renderJobs()"><option value="">💼 All Jobs</option></select>
      <select id="locationFilter" onchange="renderJobs()"><option value="">📍 All Locations</option></select>
    </div>
  </div>

  <div id="jobsContainer">
    <div style="text-align:center; padding:40px 16px; background: var(--bg-card); border-radius:var(--radius-lg); border: 1px solid var(--border)">
      <div class="loader"></div>
      <p style="color: var(--text-muted); font-weight:500; font-size:14px;">Fetching fresh jobs...</p>
    </div>
  </div>

  <!-- Main Multi-Column Form Modal Container -->
  <div class="container" id="formContainer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
      <h2>🎯 Register Profile</h2>
      <button type="button" class="btn-danger" onclick="closeForm()" style="padding: 6px 10px; font-size: 13px; border-radius: 8px;">
        ❌ Close
      </button>
    </div>

    <form id="candidateForm" autocomplete="off">
      <div class="form-grid">
        
        <div class="form-group">
          <input type="text" id="name" placeholder="Full Name" required>
        </div>

        <div class="form-group">
          <input type="tel" id="mobile" placeholder="Mobile (10 digits)" required maxlength="10" pattern="[0-9]{10}" inputmode="numeric">
        </div>

        <div class="form-group full-width">
          <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required max="2099-12-31">
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="qualification">Qualification</label>
          <select id="qualification" required>
            <option value="">Select Qualification</option>
            <option>SSC</option><option>Intermediate</option><option>Diploma</option><option>ITI</option><option>Degree</option><option>B.Com</option><option>B.Sc</option><option>BA</option><option>BBA</option><option>BCA</option><option>B.Tech</option><option>B.Pharmacy</option><option>D.Pharmacy</option><option>MBA</option><option>MCA</option><option>M.Tech</option><option>M.Com</option><option>M.Sc</option><option>LLB</option><option>LLM</option><option>PhD</option><option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="specialization">Specialization</label>
          <input id="specialization" placeholder="Stream/Branch" required>
        </div>

        <div class="form-group">
          <label for="experience">Experience</label>
          <select id="experience" required>
            <option value="">Select Experience</option>
            <option>Fresher</option><option>0-6 Months</option><option>6 Months - 1 Year</option><option>1-2 Years</option><option>2-3 Years</option><option>3-5 Years</option><option>5-7 Years</option><option>7-10 Years</option><option>10+ Years</option>
          </select>
        </div>

        <div class="form-group">
          <label for="location">Current Location</label>
          <input id="location" placeholder="City" required>
        </div>

        <div class="form-group full-width">
          <label for="appliedFor">Applied For</label>
          <input id="appliedFor" readonly required>
        </div>

        <div class="form-group full-width">
          <textarea id="address" placeholder="Complete Address" rows="2"></textarea>
        </div>

      </div>

      <button type="submit" class="btn-primary" style="width:100%; margin-top:14px; padding:14px;">🚀 Submit Application</button>
    </form>
  </div>
</div>

<div class="popup" id="successPopup">
  <div class="popup-content">
    <h3 id="popupTitle" style="font-size:18px; margin-bottom:6px;">Notification</h3>
    <p id="popupMessage" style="font-size:14px; color:var(--text-muted); margin-bottom:14px;"></p>
    <button class="btn-primary" style="width:100%; padding:10px;" onclick="document.getElementById('successPopup').style.display='none'">
      Got it
    </button>
  </div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC8cxjgdG7ABnR5Nt7HaVuXWV9iznUAl0",
  authDomain: "freewalkinsupdates-a87e0.firebaseapp.com",
  projectId: "freewalkinsupdates-a87e0",
  storageBucket: "freewalkinsupdates-a87e0.firebasestorage.app",
  messagingSenderId: "648268858586",
  appId: "1:648268858586:web:c5d3c79d8157e8a97151e3",
  measurementId: "G-KCYM0HM4ZX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const API_URL="https://script.google.com/macros/s/AKfycbxz1q8J8DoZNpNtiT9yeZ2bXTcqrukf0F387YHAxm8v6OCHE9A8FH_FGJwVbLEh315YZQ/exec";
let allJobs=[];
let selectedCompany="";
let selectedJobGender="Both";
let appliedCandidateName="";
let selectedWhatsappNumber="";

const jobFilter = document.getElementById('jobFilter');
const locationFilter = document.getElementById('locationFilter');
const searchInput = document.getElementById('searchInput');
const jobsContainer = document.getElementById('jobsContainer');
const formContainer = document.getElementById('formContainer');
const modalOverlay = document.getElementById('modalOverlay');
const candidateForm = document.getElementById('candidateForm');
const appliedFor = document.getElementById('appliedFor');
const popupTitle = document.getElementById('popupTitle');
const popupMessage = document.getElementById('popupMessage');
const successPopup = document.getElementById('successPopup');
const dob = document.getElementById('dob');

function escapeHTML(str){
 return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

async function loadJobs(){
 try{
  const snap=await getDocs(collection(db,"jobs"));
  allJobs=[];
  snap.forEach(d=>allJobs.push(d.data()));

  const jobsSet=[...new Set(allJobs.map(j=>j.title).filter(Boolean))];
  const locSet=[...new Set(allJobs.map(j=>j.location).filter(Boolean))];

  jobFilter.innerHTML='<option value="">💼 All Jobs</option>'+jobsSet.map(x=>`<option>${x}</option>`).join('');
  locationFilter.innerHTML='<option value="">📍 All Locations</option>'+locSet.map(x=>`<option>${x}</option>`).join('');

  renderJobs();

 }catch(e){
  console.error(e);
  jobsContainer.innerHTML="<div style='text-align:center; padding:20px; color:var(--danger); font-weight:600; font-size:14px;'>❌ Failed to load jobs.</div>";
 }
}

function renderJobs(){
 const search=(searchInput.value||'').toLowerCase();
 const jobVal=jobFilter.value;
 const locVal=locationFilter.value;

 const filtered=allJobs.filter(j=>
   (!search || (j.title||'').toLowerCase().includes(search) || (j.company||'').toLowerCase().includes(search)) &&
   (!jobVal || j.title===jobVal) &&
   (!locVal || j.location===locVal)
 );

 let out='';

 filtered.forEach(job=>{
   const title=String(job.title||'').replace(/'/g,"\\'");
   const company=String(job.company||'').replace(/'/g,"\\'");

   out+=`<div class="job-card">
   <h3>${escapeHTML(job.title)}</h3>
   <div class="company-name">🏢 ${escapeHTML(job.company)}</div>
   
   <div class="job-details-grid">
     <div class="detail-badge">📍 ${escapeHTML(job.location || 'Anywhere')}</div>
     <div class="detail-badge">👥 ${escapeHTML(job.jobGender || 'Both')}</div>
     <div class="detail-badge">💰 ₹${escapeHTML(job.salary)}</div>
     <div class="detail-badge">🕒 ${escapeHTML(job.jobtype || job.jobType || 'Full Time')}</div>
   </div>

   <div style="display:flex; gap:10px;">
     <button class="btn-primary" style="flex:1" onclick="showForm('${title}','${company}','${job.jobGender || "Both"}','${job.whatsappNumber || ""}')">Apply Now</button>
     <button class="btn-whatsapp" style="flex:1" onclick="openJobWhatsapp('${title}','${company}')">WhatsApp</button>
   </div>
   </div>`;
 });

 jobsContainer.innerHTML=out || "<div style='text-align:center; padding:30px; color:var(--text-muted); font-size:14px;'>No matching vacancies found.</div>";
}

function showForm(job,company,gender,whatsappNumber){
 appliedFor.value=job;
 selectedCompany=company||"";
 selectedJobGender=gender||"Both";
 selectedWhatsappNumber=whatsappNumber||"";
 
 modalOverlay.style.display="block";
 formContainer.style.display="block";
 setTimeout(() => formContainer.classList.add('active'), 10);
 document.body.style.overflow = "hidden";
}

function closeForm() {
 formContainer.classList.remove('active');
 setTimeout(() => {
   formContainer.style.display="none";
   modalOverlay.style.display="none";
 }, 200);
 document.body.style.overflow = "auto";
}

window.showForm=showForm;
window.closeForm=closeForm;
window.renderJobs=renderJobs;

window.openJobWhatsapp=function(job,company){
 if(!appliedCandidateName){
   popupTitle.innerText = "Application Required";
   popupMessage.innerHTML = "⚠️ Form submission is mandatory before sending a WhatsApp update to HR.";
   successPopup.style.display = "flex";
   return;
 }
 const msg=`Hello HR,\n\nMy name is ${appliedCandidateName}.\n\nI have applied for the ${job} position at ${company} through FreeWalkins by VenuHR.\n\nKindly review my application. Thank you.`;
 const num=(selectedWhatsappNumber||'').replace(/\D/g,'');
 if(!num){
   popupTitle.innerText = "WhatsApp Unreachable";
   popupMessage.innerHTML = "❌ HR Representative Contact info is missing.";
   successPopup.style.display = "flex";
   return;
 }
 window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}

candidateForm.addEventListener("submit",async e=>{
 e.preventDefault();
 const candidateGender=document.getElementById("gender").value;

 if(selectedJobGender!=="Both" && candidateGender!==selectedJobGender){
   popupTitle.innerText="Ineligible Profile";
   popupMessage.innerHTML=`❌ This job is specifically open for ${selectedJobGender} applicants only.`;
   successPopup.style.display="flex";
   return;
 }

 const data={
  name:document.getElementById("name").value.trim(),
  mobile:document.getElementById("mobile").value.trim(),
  email:document.getElementById("email").value.trim(),
  dob:document.getElementById("dob").value,
  gender:document.getElementById("gender").value,
  qualification:document.getElementById("qualification").value,
  specialization:document.getElementById("specialization").value.trim(),
  appliedFor:document.getElementById("appliedFor").value,
  experience:document.getElementById("experience").value,
  location:document.getElementById("location").value.trim(),
  address:document.getElementById("address").value.trim(),
  company:selectedCompany
 };

 try {
   const response=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(data)
   });
   const result=await response.json();

   popupTitle.innerText=result.success?"Success":"Registration Alert";
   popupMessage.innerHTML=result.success
   ? `✅ Application successfully received!<br><br>Your Application ID is <b>${result.appId||""}</b>`
   : `❌ ${result.message || "Mobile Number Already Registered"}`;

   if(result.success){
     appliedCandidateName=data.name;
     candidateForm.reset();
     closeForm();
   }
   successPopup.style.display = "flex";
 } catch(err) {
   popupTitle.innerText="Network Timeout";
   popupMessage.innerHTML="❌ Form processing failed. Check internet stability.";
   successPopup.style.display = "flex";
 }
});

dob.max=new Date().toISOString().split("T")[0];
loadJobs();
</script>

</body>
</html>
