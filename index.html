
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreeWalkins Updates</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  padding:10px;
}
.wrapper{
  max-width:700px;
  margin:auto;
}
.header{
  background:#16a34a;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  margin-bottom:12px;
}
.header h1{
  font-size:24px;
}
.header p{
  font-size:14px;
  margin-top:4px;
}

.job-card{
  background:#fff;
  text-align:left;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.job-card h3{font-size:18px;margin-bottom:6px;text-align:left}
.job-card p{font-size:14px;margin:4px 0;text-align:left}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

.container{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:520px;
  max-height:90vh;
  overflow:auto;
  background:#fff;
  border-radius:15px;
  padding:20px;
  z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ddd;
  border-radius:10px;
}

#appliedFor{
  background:#f3f4f6;
  font-weight:bold;
  color:#16a34a;
}

.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

.loader{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #16a34a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 10px;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>FreeWalkins Updates</h1>
<p>Latest Job Openings in Hyderabad</p>
</div>


<div style="background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
<input id="searchInput" placeholder="🔍 Search Jobs" oninput="renderJobs()">
<select id="jobFilter" onchange="renderJobs()"><option value="">💼 All Jobs</option></select>
<select id="locationFilter" onchange="renderJobs()"><option value="">📍 All Locations</option></select>
</div>

<div id="jobsContainer" style="text-align:center;padding:30px">
<div class="loader"></div>
<p>Loading Jobs...</p>
</div>

<div class="container" id="formContainer">

<button type="button"
onclick="document.getElementById('formContainer').style.display='none'"
style="background:#ef4444;margin-bottom:10px">
❌ Close
</button>

<h2>🎯 FreeWalkins Registration</h2><br>

<form id="candidateForm" autocomplete="off">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number"
required maxlength="10">

<input type="email" id="email" placeholder="Email" required>

<label><b>Date of Birth</b></label>
<input type="date" id="dob" required>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="qualification" required>
<option value="">Select Qualification</option>
<option>SSC</option>
<option>Intermediate</option>
<option>Diploma</option>
<option>ITI</option>
<option>Degree</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>BA</option>
<option>BBA</option>
<option>BCA</option>
<option>B.Tech</option>
<option>B.Pharmacy</option>
<option>D.Pharmacy</option>
<option>MBA</option>
<option>MCA</option>
<option>M.Tech</option>
<option>M.Com</option>
<option>M.Sc</option>
<option>LLB</option>
<option>LLM</option>
<option>PhD</option>
<option>Other</option>
</select>

<input id="specialization"
placeholder="Specialization" required>

<label><b>Applied For</b></label>
<input id="appliedFor" readonly required>

<select id="experience" required>
<option value="">Select Experience</option>
<option>Fresher</option>
<option>0-6 Months</option>
<option>6 Months - 1 Year</option>
<option>1-2 Years</option>
<option>2-3 Years</option>
<option>3-5 Years</option>
<option>5-7 Years</option>
<option>7-10 Years</option>
<option>10+ Years</option>
</select>

<input id="location"
placeholder="Current Location" required>

<textarea id="address"
placeholder="Address"></textarea>

<button type="submit">🚀 Submit Application</button>

</form>
</div>
</div>

<div class="popup" id="successPopup">
<div class="popup-content">
<h3 id="popupTitle">Application Submitted</h3>
<p id="popupMessage">Application Submitted Successfully</p>
<button onclick="document.getElementById('successPopup').style.display='none'">
OK
</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxz1q8J8DoZNpNtiT9yeZ2bXTcqrukf0F387YHAxm8v6OCHE9A8FH_FGJwVbLEh315YZQ/exec";
let allJobs=[];

async function loadJobs(){

 try{

   const res=await fetch(API_URL+"?action=getJobs");
   allJobs=await res.json();
   const jobs=allJobs.slice(0,10); // Fast initial loading

   let html="";

   jobs.forEach(job=>{

     const title=String(job.title).replace(/'/g,"\\'");

     html+=`
     <div class="job-card">
       <h3>${escapeHTML(job.title)}</h3>
       <p>🏢 ${escapeHTML(job.company)}</p>
       <p>📍 ${escapeHTML(job.location)}</p>
       <p>💰 ₹${escapeHTML(job.salary)}</p>
      <p>🕒 ${escapeHTML(job.jobType || 'Full Time')}</p>
      <p>📞 ${escapeHTML(job.whatsapp || '')}</p>
      <button onclick="showForm('${title}')">
         Apply Now
      </button>
      ${job.whatsapp ? `<a href="https://wa.me/91${job.whatsapp}" target="_blank"><button style="background:#25D366;margin-top:6px">💬 WhatsApp HR</button></a>` : ''}
     </div>`;

   });

   document.getElementById("jobsContainer").innerHTML=html;

   const jt=[...new Set(allJobs.map(x=>x.title))];
   const lc=[...new Set(allJobs.map(x=>x.location))];
   document.getElementById("jobFilter").innerHTML='<option value="">💼 All Jobs</option>'+jt.map(x=>`<option>${x}</option>`).join('');
   document.getElementById("locationFilter").innerHTML='<option value="">📍 All Locations</option>'+lc.map(x=>`<option>${x}</option>`).join('');

 }catch(e){

   document.getElementById("jobsContainer").innerHTML=
   "Jobs loading failed";

   console.log(e);
 }
}



function escapeHTML(str){
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function renderJobs(){
 const s=document.getElementById("searchInput").value.toLowerCase();
 const j=document.getElementById("jobFilter").value;
 const l=document.getElementById("locationFilter").value;
 let out="";
 allJobs.filter(x=>(!s||x.title.toLowerCase().includes(s)||x.company.toLowerCase().includes(s))&&(!j||x.title===j)&&(!l||x.location===l)).forEach(job=>{
 const title=String(job.title).replace(/'/g,"\\'");
 out+=`<div class="job-card"><h3>${escapeHTML(job.title)}</h3><p>🏢 ${escapeHTML(job.company)}</p><p>📍 ${escapeHTML(job.location)}</p><p>💰 ₹${escapeHTML(job.salary)}</p><p>🕒 ${escapeHTML(job.jobType || 'Full Time')}</p><p>📞 ${escapeHTML(job.whatsapp || '')}</p><button onclick="showForm('${title}')">Apply Now</button>${job.whatsapp ? `<a href="https://wa.me/91${job.whatsapp}" target="_blank"><button style="background:#25D366;margin-top:6px">💬 WhatsApp HR</button></a>` : ''}</div>`;
 });
 document.getElementById("jobsContainer").innerHTML=out||"No jobs found";
}

function showForm(job){

 document.getElementById("appliedFor").value=job;

 document.getElementById("formContainer").style.display="block";

}

document.getElementById("candidateForm")
.addEventListener("submit",async function(e){

 e.preventDefault();

 const data={
  name:document.getElementById("name").value,
  mobile:document.getElementById("mobile").value,
  email:document.getElementById("email").value,
  dob:document.getElementById("dob").value,
  gender:document.getElementById("gender").value,
  qualification:document.getElementById("qualification").value,
  specialization:document.getElementById("specialization").value,
  appliedFor:document.getElementById("appliedFor").value,
  experience:document.getElementById("experience").value,
  location:document.getElementById("location").value,
  address:document.getElementById("address").value
 };


 const mobileRegex=/^[6-9]\d{9}$/;
 if(!mobileRegex.test(data.mobile)){
   alert("Please enter a valid 10-digit mobile number");
   return;
 }

 if(data.name.length < 3){
   alert("Please enter a valid name");
   return;
 }

 try{

   const response = await fetch(API_URL,{

     method:"POST",
     headers:{
       "Content-Type":"text/plain;charset=utf-8"
     },
     body:JSON.stringify(data)
   });

   const result = await response.json();

   if(result.success){

     document.getElementById("popupTitle").innerText =
     "Application Submitted";

     document.getElementById("popupMessage").innerHTML =
     "✅ Application Submitted Successfully<br><br>Application ID: <b>" +
     (result.appId || "") + "</b>";

     document.getElementById("successPopup").style.display = "flex";

     document.getElementById("candidateForm").reset();
     document.getElementById("formContainer").style.display = "none";

   }else{

     document.getElementById("formContainer").style.display = "none";

     document.getElementById("popupTitle").innerText =
     "Already Registered";

     document.getElementById("popupMessage").innerHTML =
     "❌ " + (result.message || "Mobile Number Already Registered");

     document.getElementById("successPopup").style.display = "flex";

   }

 }catch(err){

   alert("Submission Failed");
 }
});

document.getElementById("dob").max = new Date().toISOString().split("T")[0];
loadJobs();
</script>

</body>
</html>
