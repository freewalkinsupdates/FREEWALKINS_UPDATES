<!-- Firebase & Core Job Scripts -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC8cxjgdG7ABnR5Nt7HaVuXWV9iznUAl0",
  authDomain: "freewalkinsupdates-a87e0.firebaseapp.com",
  projectId: "freewalkinsupdates-a87e0",
  storageBucket: "freewalkinsupdates-a87e0.firebasestorage.app",
  messagingSenderId: "648268858586",
  appId: "1:648268858586:web:c5d3c79d8157e8a97151e3",
  measurementId: "G-KCYM0HM4ZX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const API_URL="https://script.google.com/macros/s/AKfycbxz1q8J8DoZNpNtiT9yeZ2bXTcqrukf0F387YHAxm8v6OCHE9A8FH_FGJwVbLEh315YZQ/exec";
let allJobs=[];
let selectedCompany="";
let selectedJobGender="Both";
let appliedCandidateName="";
let selectedWhatsappNumber="";
let friendMobiles=[];

function escapeHTML(str){
 return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

async function loadJobs(){
 try{
  const snap=await getDocs(collection(db,"jobs"));
  allJobs=[];
  snap.forEach(d=>allJobs.push(d.data()));

  const jobsSet=[...new Set(allJobs.map(j=>j.title).filter(Boolean))];
  const locSet=[...new Set(allJobs.map(j=>j.location).filter(Boolean))];

  jobFilter.innerHTML='<option value="">💼 All Jobs</option>'+jobsSet.map(x=>`<option>${x}</option>`).join('');
  locationFilter.innerHTML='<option value="">📍 All Locations</option>'+locSet.map(x=>`<option>${x}</option>`).join('');

  renderJobs();
 }catch(e){
  console.error(e);
  jobsContainer.innerHTML="Unable to load jobs. Check Firestore rules.";
 }
}

function renderJobs(){
 const search=(searchInput.value||'').toLowerCase();
 const jobVal=jobFilter.value;
 const locVal=locationFilter.value;

 const filtered=allJobs.filter(j=>
   (!search || (j.title||'').toLowerCase().includes(search) || (j.company||'').toLowerCase().includes(search)) &&
   (!jobVal || j.title===jobVal) &&
   (!locVal || j.location===locVal)
 );

 let out='';
 filtered.forEach(job=>{
   const title=String(job.title||'').replace(/'/g,"\\'");
   const company=String(job.company||'').replace(/'/g,"\\'");

   out+=`<div class="job-card">
   <h3>${escapeHTML(job.title)}</h3>
   <p>🏢 ${escapeHTML(job.company)}</p>
   <p>📍 ${escapeHTML(job.location || 'Location Not Mentioned')}</p>
   <p>👥 ${escapeHTML(job.jobGender || 'Both')}</p>
   <p>💰 ₹${escapeHTML(job.salary)}</p>
   <p>🕒 ${escapeHTML(job.jobtype || job.jobType || 'Full Time')}</p>
   <div style="display:flex;gap:8px">
<button style="flex:1" onclick="showForm('${title}','${company}','${job.jobGender || "Both"}','${job.whatsappNumber || ""}')">Apply Now</button>
<button style="flex:1;background:#25D366" onclick="openJobWhatsapp('${title}','${company}')" >WhatsApp</button>
</div>
   </div>`;
 });
 jobsContainer.innerHTML=out || "No jobs found";
}

function showForm(job,company,gender,whatsappNumber){
 appliedFor.value=job;
 selectedCompany=company||"";
 selectedJobGender=gender||"Both";
 selectedWhatsappNumber=whatsappNumber||"";
 formContainer.style.display="block";
}

window.showForm=showForm;
window.renderJobs=renderJobs;

window.openJobWhatsapp=function(job,company){
 if(!appliedCandidateName){
   alert('Please do Apply First');
   return;
 }
 let extra='';
 if(friendMobiles.length){
   extra='\nFriends applying together: '+friendMobiles.length+'\n'+friendMobiles.map((x,i)=>'Friend '+(i+1)+' Mobile: '+x).join('\n');
 }
 const msg=`Hello HR, \n\nCandidate Name: ${appliedCandidateName}\nApplied Job: ${job}\nCompany: ${company}${extra}\n\nThank You`;
 const num=(selectedWhatsappNumber||'').replace(/\D/g,'');
 if(!num){ alert('Company WhatsApp number not set'); return; }
 window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}

candidateForm.addEventListener("submit",async e=>{
 e.preventDefault();
 const candidateGender=document.getElementById("gender").value;
 if(selectedJobGender!=="Both" && candidateGender!==selectedJobGender){
   popupTitle.innerText="Not Eligible";
   popupMessage.innerHTML=`❌ Only ${selectedJobGender} candidates can apply for this job.`;
   successPopup.style.display="flex";
   return;
 }

 const data={
  name:document.getElementById("name").value.trim(),
  mobile:document.getElementById("mobile").value.trim(),
  email:document.getElementById("email").value.trim(),
  dob:document.getElementById("dob").value,
  gender:document.getElementById("gender").value,
  qualification:document.getElementById("qualification").value,
  specialization:document.getElementById("specialization").value.trim(),
  appliedFor:document.getElementById("appliedFor").value,
  experience:document.getElementById("experience").value,
  location:document.getElementById("location").value.trim(),
  address:document.getElementById("address").value.trim(),
  company:selectedCompany
 };

 const response=await fetch(API_URL,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify(data)
 });

 const result=await response.json();
 popupTitle.innerText=result.success?"Application Submitted":"Already Registered";
 popupMessage.innerHTML=result.success ? `✅ Application Submitted Successfully<br><br>Application ID: <b>${result.appId||""}</b>` : `❌ ${result.message || "Mobile Number Already Registered"}`;

 if(result.success){
   appliedCandidateName=data.name;
   candidateForm.reset();
   formContainer.style.display="none"; setTimeout(openGroupApplyAI,300);
 }
 successPopup.style.display="flex";
});

dob.max=new Date().toISOString().split("T")[0];
loadJobs();
</script>

<script>
const OPENROUTER_API_KEY = "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";

function toggleCareerChat(){
 const box = document.getElementById('careerChatBox');
 if(box.style.display === 'flex') {
   box.style.display = 'none';
 } else {
   box.style.display = 'flex';
   if(!window.chatStarted){
     addAI('Hello! I am your AI Career Assistant. How can I help you today? You can choose a quick action below or type any question.', ['Resume Help', 'Interview Tips', 'Job Search', 'Talk to HR']);
     window.chatStarted = true;
   }
 }
}

function addAI(text, buttons = []){
 const msgsArea = document.getElementById('careerMsgs');
 let msgHtml = `<div class="msg ai">${text}`;
 if(buttons.length){
   msgHtml += '<div style="margin-top: 8px;">';
   buttons.forEach(btn => {
     msgHtml += `<button class="actionBtn" onclick="quickAction('${btn}')">${btn}</button>`;
   });
   msgHtml += '</div>';
 }
 msgHtml += '</div>';
 msgsArea.innerHTML += msgHtml;
 msgsArea.scrollTop = msgsArea.scrollHeight;
}

function addUser(text){
 const msgsArea = document.getElementById('careerMsgs');
 msgsArea.innerHTML += `<div class="msg user">${text}</div>`;
 msgsArea.scrollTop = msgsArea.scrollHeight;
}

function showLoader() {
 const msgsArea = document.getElementById('careerMsgs');
 const loaderHtml = `<div class="msg ai" id="ai-loader"><div class="typing-dots"><span></span><span></span><span></span></div> Thinking...</div>`;
 msgsArea.innerHTML += loaderHtml;
 msgsArea.scrollTop = msgsArea.scrollHeight;
}

function removeLoader() {
 const loader = document.getElementById('ai-loader');
 if(loader) loader.remove();
}

function quickAction(actionName){
 addUser(actionName);
 handleCareerRouting(actionName);
}

function sendCareerMsg(){
 const input = document.getElementById('careerInput');
 const query = input.value.trim();
 if(!query) return;
 input.value = '';
 addUser(query);
 handleCareerRouting(query);
}

// Routes to local shortcuts or triggers Real-time OpenRouter AI
async function handleCareerRouting(q) {
 const lowQ = q.toLowerCase();

 if(lowQ.includes('create resume')) { window.open('https://www.canva.com/resumes/templates/','_blank'); return; }
 if(lowQ.includes('sample resume')) { window.open('https://www.resume.com/resume-templates/','_blank'); return; }
 if(lowQ.includes('interview tips') || lowQ.includes('mock interview')) { window.open('https://www.indeed.com/career-advice/interviewing','_blank'); return; }
 if(lowQ.includes('talk to hr') || lowQ.includes('support')) { window.open('https://wa.me/919550918829','_blank'); return; }
 if(lowQ.includes('job search') || lowQ.includes('apply job')) { window.open('https://freewalkins.in','_blank'); return; }

 if(lowQ.includes('resume')) {
   addAI('📄 Resume Help Center', ['Create Resume','Sample Resume','Talk to HR']);
   return;
 }

 if(lowQ.includes('interview')) {
   addAI('🎤 Interview Preparation', ['Interview Tips','Mock Interview','Talk to HR']);
   return;
 }

 if(lowQ.includes('job')) {
   addAI('💼 Latest jobs are available on FreeWalkins.', ['Job Search','Talk to HR']);
   return;
 }

 let localResponse = '';
 if(lowQ.includes('hyderabad')){
   localResponse = '📍 Hyderabad lo BPO, Pharmacy, Sales and Telecaller jobs available.';
 } else if(lowQ.includes('fresher')){
   localResponse = '🎓 Freshers ki entry-level jobs ekkuvaga available unnayi.';
 } else if(lowQ.includes('b.tech') || lowQ.includes('mca')){
   localResponse = '💻 IT careers lo Java, Python, Testing and Support roles try cheyyachu.';
 }

 showLoader();
 try {
   const response = await fetch('https://openrouter.ai/api/v1/chat/completions',{
     method:'POST',
     headers:{
       'Authorization':'Bearer ' + OPENROUTER_API_KEY,
       'Content-Type':'application/json'
     },
     body:JSON.stringify({
       model:'qwen/qwen3-30b-a3b:free',
       messages:[
         {role:'system',content:'You are FreeWalkins Career AI Assistant. Give short and helpful career guidance.'},
         {role:'user',content:q}
       ]
     })
   });

   const data = await response.json();
   removeLoader();

   const reply = data?.choices?.[0]?.message?.content;
   if(reply){
      addAI(reply,['Talk to HR']);
   } else if(localResponse){
      addAI(localResponse,['Job Search','Talk to HR']);
   } else {
      addAI('Server busy. Please try again later.',['Talk to HR']);
   }
 } catch(e){
   removeLoader();
   if(localResponse){
      addAI(localResponse,['Job Search','Talk to HR']);
   } else {
      addAI('Connection error. Please contact HR.',['Talk to HR']);
   }
 }
}

document.addEventListener('DOMContentLoaded',()=>{

 if(el){
  el.addEventListener('keydown', e => {
   if(e.key === 'Enter'){
    e.preventDefault();
    sendCareerMsg();

 }
});
</script>
