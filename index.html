
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreeWalkins V17 Professional HR Message</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  padding:10px;
}
.wrapper{
  max-width:700px;
  margin:auto;
}
.header{
  background:#16a34a;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  margin-bottom:12px;
}
.header h1{
  font-size:24px;
}
.header p{
  font-size:14px;
  margin-top:4px;
}

.job-card{
  background:#fff;
  text-align:left;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.job-card h3{font-size:18px;margin-bottom:6px;text-align:left}
.job-card p{font-size:14px;margin:4px 0;text-align:left}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

.container{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:520px;
  max-height:90vh;
  overflow:auto;
  background:#fff;
  border-radius:15px;
  padding:20px;
  z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ddd;
  border-radius:10px;
}

#appliedFor{
  background:#f3f4f6;
  font-weight:bold;
  color:#16a34a;
}

.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-content{
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
  z-index:10000;
}

.loader{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #16a34a;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 10px;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

</style>



</head>

<body>

<div class="wrapper">

<div class="header">
<h1>FreeWalkins by VenuHR</h1>
<p>Job Updates • Apply Online</p>
</div>


<div style="background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
<input id="searchInput" placeholder="🔍 Search Jobs" oninput="renderJobs()">
<select id="jobFilter" onchange="renderJobs()"><option value="">💼 All Jobs</option></select>
<select id="locationFilter" onchange="renderJobs()"><option value="">📍 All Locations</option></select>
</div>


<div id="jobsContainer" style="text-align:center;padding:30px">
<div class="loader"></div>
<p>Loading Jobs...</p>
</div>

<div class="container" id="formContainer">

<button type="button"
onclick="document.getElementById('formContainer').style.display='none'"
style="background:#ef4444;margin-bottom:10px">
❌ Close
</button>


<h2>🎯 FreeWalkins Registration</h2>
<form id="candidateForm" autocomplete="off">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number"
required maxlength="10" pattern="[0-9]{10}" inputmode="numeric">

<input type="email" id="email" placeholder="Email" required>

<label><b>Date of Birth</b></label>
<input type="date" id="dob" required max="2099-12-31">

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="qualification" required>
<option value="">Select Qualification</option>
<option>SSC</option>
<option>Intermediate</option>
<option>Diploma</option>
<option>ITI</option>
<option>Degree</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>BA</option>
<option>BBA</option>
<option>BCA</option>
<option>B.Tech</option>
<option>B.Pharmacy</option>
<option>D.Pharmacy</option>
<option>MBA</option>
<option>MCA</option>
<option>M.Tech</option>
<option>M.Com</option>
<option>M.Sc</option>
<option>LLB</option>
<option>LLM</option>
<option>PhD</option>
<option>Other</option>
</select>

<input id="specialization"
placeholder="Specialization" required>

<label><b>Applied For</b></label>
<input id="appliedFor" readonly required>

<select id="experience" required>
<option value="">Select Experience</option>
<option>Fresher</option>
<option>0-6 Months</option>
<option>6 Months - 1 Year</option>
<option>1-2 Years</option>
<option>2-3 Years</option>
<option>3-5 Years</option>
<option>5-7 Years</option>
<option>7-10 Years</option>
<option>10+ Years</option>
</select>

<input id="location"
placeholder="Current Location" required>

<textarea id="address"
placeholder="Address"></textarea>

<button type="submit">🚀 Submit Application</button>

</form>
</div>
</div>

<div class="popup" id="successPopup">
<div class="popup-content">
<h3 id="popupTitle">Application Submitted</h3>
<p id="popupMessage">Application Submitted Successfully</p>
<button onclick="document.getElementById('successPopup').style.display='none'">
OK
</button>
</div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC8cxjgdG7ABnR5Nt7HaVuXWV9iznUAl0",
  authDomain: "freewalkinsupdates-a87e0.firebaseapp.com",
  projectId: "freewalkinsupdates-a87e0",
  storageBucket: "freewalkinsupdates-a87e0.firebasestorage.app",
  messagingSenderId: "648268858586",
  appId: "1:648268858586:web:c5d3c79d8157e8a97151e3",
  measurementId: "G-KCYM0HM4ZX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const API_URL="https://script.google.com/macros/s/AKfycbxz1q8J8DoZNpNtiT9yeZ2bXTcqrukf0F387YHAxm8v6OCHE9A8FH_FGJwVbLEh315YZQ/exec";
let allJobs=[];
let selectedCompany="";
let selectedJobGender="Both";
let appliedCandidateName="";
let selectedWhatsappNumber="";

function escapeHTML(str){
 return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

async function loadJobs(){
 try{
  const snap=await getDocs(collection(db,"jobs"));
  allJobs=[];
  snap.forEach(d=>allJobs.push(d.data()));

  const jobsSet=[...new Set(allJobs.map(j=>j.title).filter(Boolean))];
  const locSet=[...new Set(allJobs.map(j=>j.location).filter(Boolean))];

  jobFilter.innerHTML='<option value="">💼 All Jobs</option>'+jobsSet.map(x=>`<option>${x}</option>`).join('');
  locationFilter.innerHTML='<option value="">📍 All Locations</option>'+locSet.map(x=>`<option>${x}</option>`).join('');

  renderJobs();

 }catch(e){
  console.error(e);
  jobsContainer.innerHTML="Unable to load jobs. Check Firestore rules.";
 }
}

function renderJobs(){
 const search=(searchInput.value||'').toLowerCase();
 const jobVal=jobFilter.value;
 const locVal=locationFilter.value;

 const filtered=allJobs.filter(j=>
   (!search || (j.title||'').toLowerCase().includes(search) || (j.company||'').toLowerCase().includes(search)) &&
   (!jobVal || j.title===jobVal) &&
   (!locVal || j.location===locVal)
 );

 let out='';

 filtered.forEach(job=>{
   const title=String(job.title||'').replace(/'/g,"\\'");
   const company=String(job.company||'').replace(/'/g,"\\'");

   out+=`<div class="job-card">
   <h3>${escapeHTML(job.title)}</h3>
   <p>🏢 ${escapeHTML(job.company)}</p>
   <p>📍 ${escapeHTML(job.location || 'Location Not Mentioned')}</p>
   <p>👥 ${escapeHTML(job.jobGender || 'Both')}</p>
   <p>💰 ₹${escapeHTML(job.salary)}</p>
   <p>🕒 ${escapeHTML(job.jobtype || job.jobType || 'Full Time')}</p>
   <div style="display:flex;gap:8px">
<button style="flex:1" onclick="showForm('${title}','${company}','${job.jobGender || "Both"}','${job.whatsappNumber || ""}')">Apply Now</button>
<button style="flex:1;background:#25D366" onclick="openJobWhatsapp('${title}','${company}')" >WhatsApp</button>
</div>
   </div>`;
 });

 jobsContainer.innerHTML=out || "No jobs found";
}
function showForm(job,company,gender,whatsappNumber){
 appliedFor.value=job;
 selectedCompany=company||"";
 selectedJobGender=gender||"Both";
 selectedWhatsappNumber=whatsappNumber||"";
 formContainer.style.display="block";
}

window.showForm=showForm;
window.renderJobs=renderJobs;

window.openJobWhatsapp=function(job,company){
 if(!appliedCandidateName){
   popupTitle.innerText = "Apply Required";
   popupMessage.innerHTML = "⚠️ Please apply for the job first, then use WhatsApp to contact HR.";
   successPopup.style.display = "flex";
   return;
 }
 const msg=`Hello HR,

My name is ${appliedCandidateName}.

I have applied for the ${job} position at ${company} through FreeWalkins by VenuHR, and I am interested in this position.

Kindly review my application and let me know the next steps.

Thank you.`;
 const num=(selectedWhatsappNumber||'').replace(/\D/g,'');
 if(!num){
   popupTitle.innerText = "WhatsApp Not Available";
   popupMessage.innerHTML = "❌ Company WhatsApp number is not available.";
   successPopup.style.display = "flex";
   return;
 }
 window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}


candidateForm.addEventListener("submit",async e=>{
 e.preventDefault();


 const candidateGender=document.getElementById("gender").value;

 if(selectedJobGender!=="Both" && candidateGender!==selectedJobGender){
   popupTitle.innerText="Not Eligible";
   popupMessage.innerHTML=`❌ Only ${selectedJobGender} candidates can apply for this job.`;
   successPopup.style.display="flex";
   return;
 }

 const data={

  name:document.getElementById("name").value.trim(),
  mobile:document.getElementById("mobile").value.trim(),
  email:document.getElementById("email").value.trim(),
  dob:document.getElementById("dob").value,
  gender:document.getElementById("gender").value,
  qualification:document.getElementById("qualification").value,
  specialization:document.getElementById("specialization").value.trim(),
  appliedFor:document.getElementById("appliedFor").value,
  experience:document.getElementById("experience").value,
  location:document.getElementById("location").value.trim(),
  address:document.getElementById("address").value.trim(),
  company:selectedCompany
 };

 const response=await fetch(API_URL,{
  method:"POST",
  headers:{"Content-Type":"text/plain;charset=utf-8"},
  body:JSON.stringify(data)
 });

 const result=await response.json();

 popupTitle.innerText=result.success?"Application Submitted":"Already Registered";
 popupMessage.innerHTML=result.success
 ? `✅ Application Submitted Successfully<br><br>Application ID: <b>${result.appId||""}</b>`
 : `❌ ${result.message || "Mobile Number Already Registered"}`;

 if(result.success){
   appliedCandidateName=data.name;
   candidateForm.reset();
   formContainer.style.display="none";
 }
 successPopup.style.display="flex";
});

dob.max=new Date().toISOString().split("T")[0];
loadJobs();

document.querySelectorAll('#candidateForm input,#candidateForm select,#candidateForm textarea').forEach(el=>{
  el.addEventListener('focus',()=>{
    const ai=document.getElementById('formAI');
    if(ai) ai.style.display='none';
  });
});

</script>








</body>

</html>
