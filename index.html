<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreeWalkins Pro - AI Matcher</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #10b981;
  --primary-hover: #059669;
  --primary-light: rgba(16, 185, 129, 0.1);
  --whatsapp: #22c55e;
  --whatsapp-hover: #16a34a;
  --danger: #ef4444;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-lg: 16px;
  --radius-md: 12px;
  --transition: all 0.2s ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
  }
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg-main);color:var(--text-main);padding:12px;line-height:1.5;}
.wrapper{width:100%;max-width:600px;margin:0 auto}

.header{
  background: linear-gradient(135deg, #059669 0%, #10b981 100%);
  color: #fff; padding: 26px 16px; border-radius: var(--radius-lg); text-align: center; margin-bottom: 16px;
}
.header h1{font-size:26px; font-weight:700;}

.filter-box {
  background: var(--bg-card); padding: 14px; border-radius: var(--radius-lg); margin-bottom: 16px;
  border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;
}

input, select, textarea {
  width:100%; padding:12px; border:1px solid var(--border); border-radius:var(--radius-md);
  font-family:inherit; font-size:14px; color:var(--text-main); background-color:var(--bg-card); outline:none;
}
input:focus, select:focus, textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-light); }

.telugu-hint { font-size: 11px; color: #f59e0b; display: block; margin-top: 2px; font-weight: 500; }

.section-title { font-size: 18px; font-weight: 700; margin: 20px 0 10px 0; }

.profile-summary-badge {
  background: var(--primary-light); border: 1px solid var(--primary); padding: 12px;
  border-radius: var(--radius-md); font-size: 13px; font-weight: 500; margin-bottom: 16px; display: none;
}

.job-card{
  background: var(--bg-card); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px;
  border: 1px solid var(--border); position: relative; overflow: hidden;
}
.job-card.mismatch { opacity: 0.6; border-left: 4px solid var(--danger); }
.mismatch-tag { background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; position: absolute; top: 0; right: 0; border-bottom-left-radius: 8px; font-weight: bold; }

.job-card h3{font-size:18px; margin-bottom:4px;}
.company-name { font-size: 14px; color: var(--primary); font-weight: 600; margin-bottom: 12px; }
.job-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.detail-badge { background: var(--bg-main); padding: 8px; border-radius: 8px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

button { font-family:inherit; font-size:14px; font-weight:600; border:none; border-radius:var(--radius-md); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:12px; gap:6px; flex: 1; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

.btn-whatsapp { background: var(--whatsapp); color: #fff; }
.btn-whatsapp:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

.container{
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 94%; max-width: 480px; max-height: 90vh; overflow-y: auto; background: var(--bg-card);
  border-radius: var(--radius-lg); padding: 20px; z-index: 1000; border: 1px solid var(--border);
}
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 999; }

/* Skills Section Custom UI */
.skills-container { border: 1px solid var(--border); padding: 10px; border-radius: var(--radius-md); max-height: 140px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.skill-item { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.skill-item input { width: auto; margin: 0; cursor: pointer; }

.popup{ display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); justify-content:center; align-items:center; z-index:9999; padding: 12px; }
.popup-content{ background: var(--bg-card); padding: 20px; border-radius: var(--radius-lg); text-align: center; width: 100%; max-width: 320px; }
.loader { width: 30px; height: 30px; border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin{ to{transform:rotate(360deg);} }
</style>
</head>

<body>
<div class="modal-overlay" id="modalOverlay"></div>
<div class="wrapper">

  <div class="header">
    <h1>FreeWalkins Pro</h1>
    <p>⚡ Dynamic Smart Eligibility Matcher ⚡</p>
  </div>

  <div class="filter-box">
    <input id="searchInput" placeholder="🔍 Search companies, roles or categories..." oninput="renderJobs()">
  </div>

  <div class="profile-summary-badge" id="profileBadge"></div>

  <div class="section-title">💼 Available Vacancies Lineup</div>
  <div id="jobsContainer">
    <div style="text-align:center; padding:30px;"><div class="loader"></div></div>
  </div>

  <div class="container" id="formContainer">
    <h2 style="text-align:center; color:var(--primary);">⚡ Verification & Onboarding</h2>
    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:15px;">Fill details honestly to calculate your instant eligibility.</p>

    <form id="candidateForm">
      <div style="display:flex; flex-direction:column; gap:12px;">
        
        <div>
          <input type="text" id="name" placeholder="Full Name (పూర్తి పేరు)" required>
        </div>

        <div>
          <input type="tel" id="mobile" placeholder="WhatsApp Number (మొబైల్ నెంబర్)" required maxlength="10" pattern="[0-9]{10}">
        </div>

        <div>
          <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div>
          <label style="font-size:12px; font-weight:600; color:var(--text-muted);">Date of Birth (పుట్టిన తేదీ)</label>
          <input type="date" id="dob" required>
        </div>

        <div>
          <select id="gender" required>
            <option value="">Select Gender (లింగము)</option>
            <option>Male</option><option>Female</option>
          </select>
        </div>

        <div>
          <select id="qualification" required>
            <option value="">Highest Qualification (చదువు)</option>
            <option>SSC</option><option>Intermediate</option><option>Diploma</option><option>ITI</option><option>Degree</option><option>B.Com</option><option>B.Sc</option><option>BA</option><option>BBA</option><option>BCA</option><option>B.Tech</option><option>B.Pharmacy</option><option>MBA</option><option>MCA</option><option>M.Tech</option>
          </select>
        </div>

        <div>
          <select id="candidateExperience" required>
            <option value="">Work Status (అనుభవం ఉందా?)</option>
            <option value="Fresher">No, I am a Fresher (ఫ్రెషర్)</option>
            <option value="Experienced">Yes, I have Experience (ఎక్స్పీరియన్స్)</option>
          </select>
        </div>

        <div>
          <select id="jobCategory" required>
            <option value="">Looking For Job Category (ఏ కేటగిరీ జాబ్స్ కావాలి?)</option>
            <option value="Any">All / Any Job (అన్ని ఉద్యోగాలు)</option>
            <option value="IT / Software">IT / Software Jobs</option>
            <option value="BPO / Customer Support">BPO / Customer Support</option>
            <option value="Banking & Finance">Banking & Finance</option>
            <option value="Digital Marketing">Digital Marketing & SEO</option>
            <option value="Sales & Marketing">Sales & Marketing</option>
            <option value="Retail / Mall Jobs">Retail / Mall Jobs</option>
            <option value="Pharma / Healthcare">Pharma / Healthcare</option>
            <option value="Office Assistant / Admin">Office Assistant / Admin</option>
            <option value="Delivery / Driving">Delivery / Driving Jobs</option>
            <option value="Manufacturing / ITI">Manufacturing / ITI Jobs</option>
          </select>
        </div>

        <div>
          <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:4px;">Select Your Skills (ఏమి వచ్చు? గరిష్టంగా 8 ఎంచుకోండి):</label>
          <div class="skills-container" id="skillsWrapper">
            <label class="skill-item"><input type="checkbox" value="Java"> Java</label>
            <label class="skill-item"><input type="checkbox" value="Python"> Python</label>
            <label class="skill-item"><input type="checkbox" value="HTML/CSS"> HTML/CSS</label>
            <label class="skill-item"><input type="checkbox" value="JavaScript"> JavaScript</label>
            <label class="skill-item"><input type="checkbox" value="Excel"> MS Excel</label>
            <label class="skill-item"><input type="checkbox" value="Communication"> Communication</label>
            <label class="skill-item"><input type="checkbox" value="Typing"> Fast Typing</label>
            <label class="skill-item"><input type="checkbox" value="Telecalling"> Telecalling</label>
            <label class="skill-item"><input type="checkbox" value="Sales"> Field Sales</label>
            <label class="skill-item"><input type="checkbox" value="Accounting"> Accounting (Tally)</label>
            <label class="skill-item"><input type="checkbox" value="Photoshop"> Photoshop / Editing</label>
            <label class="skill-item"><input type="checkbox" value="SEO"> SEO / Marketing</label>
            <label class="skill-item"><input type="checkbox" value="Driving"> Driving (2/4 Wheeler)</label>
            <label class="skill-item"><input type="checkbox" value="Customer Service"> Customer Service</label>
            <label class="skill-item"><input type="checkbox" value="SQL"> SQL Database</label>
            <label class="skill-item"><input type="checkbox" value="Data Entry"> Data Entry</label>
            <label class="skill-item"><input type="checkbox" value="Hardware"> System Hardware</label>
            <label class="skill-item"><input type="checkbox" value="Billing"> Cash Billing</label>
            <label class="skill-item"><input type="checkbox" value="Management"> Team Management</label>
            <label class="skill-item"><input type="checkbox" value="Pharma Knowledge"> Pharma Knowledge</label>
          </div>
          <span class="telugu-hint" id="skillsCountHint">💡 Selected: 0 / 8 Skills</span>
        </div>

        <div>
          <select id="candidateArea" required>
            <option value="">Your Current Area in Hyd (మీరు ఉండే ఏరియా)</option>
            <option>Ameerpet</option><option>Gachibowli</option><option>Secunderabad</option><option>Dilsukhnagar</option><option>Kukatpally</option><option>Madhapur</option><option>Uppal</option><option>LB Nagar</option><option>Mehdipatnam</option><option>Begumpet</option><option>Other</option>
          </select>
        </div>

        <div>
          <textarea id="address" placeholder="Full Address (పూర్తి చిరునామా)" rows="2" required></textarea>
        </div>

      </div>

      <button type="submit" class="btn-primary" style="margin-top:16px; padding:14px; flex: none; width: 100%;">🚀 Unlock Verified Openings</button>
    </form>
  </div>
</div>

<div class="popup" id="successPopup">
  <div class="popup-content">
    <h3 id="popupTitle">Processing</h3>
    <p id="popupMessage" style="margin:10px 0; font-size:13px; color:var(--text-muted);"></p>
    <button class="btn-primary" id="popupBtn" style="width:100%;" onclick="document.getElementById('successPopup').style.display='none'">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAC8cxjgdG7ABnR5Nt7HaVuXWV9iznUAl0",
  authDomain: "freewalkinsupdates-a87e0.firebaseapp.com",
  projectId: "freewalkinsupdates-a87e0",
  storageBucket: "freewalkinsupdates-a87e0.firebasestorage.app",
  messagingSenderId: "648268858586",
  appId: "1:648268858586:web:c5d3c79d8157e8a97151e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const API_URL = "https://script.google.com/macros/s/AKfycbx9JEuf9FmhROl2FuunAQVkkbfcbliO8YGdBFsrXwmrOyDqn0_te5Nd084f6lfp-Cwx/exec";

let allJobs = [];
let registeredCandidate = null;
let appliedCompanies = []; 

const qualOrder = ["Any", "SSC", "Intermediate", "ITI", "Diploma", "Degree", "B.Com", "B.Sc", "BA", "BBA", "BCA", "B.Tech", "B.Pharmacy", "MBA", "MCA", "M.Tech"];

// Limit Checkbox selection up to 8 Skills
const checkboxes = document.querySelectorAll('#skillsWrapper input[type="checkbox"]');
checkboxes.forEach(cb => {
  cb.addEventListener('change', () => {
    let checked = document.querySelectorAll('#skillsWrapper input[type="checkbox"]:checked');
    document.getElementById('skillsCountHint').innerText = `💡 Selected: ${checked.length} / 8 Skills`;
    if(checked.length > 8) {
      cb.checked = false;
      alert("You can select a maximum of 8 skills only!");
      let reChecked = document.querySelectorAll('#skillsWrapper input[type="checkbox"]:checked');
      document.getElementById('skillsCountHint').innerText = `💡 Selected: ${reChecked.length} / 8 Skills`;
    }
  });
});

async function loadJobs(){
 try {
  const snap = await getDocs(collection(db, "jobs"));
  allJobs = [];
  snap.forEach(d => allJobs.push(d.data()));
  renderJobs();
  document.getElementById('modalOverlay').style.display = "block";
  document.getElementById('formContainer').style.display = "block";
 } catch(e) {
  jobsContainer.innerHTML = "<p style='color:red; text-align:center;'>Failed to load database items.</p>";
 }
}

function renderJobs(){
 const search = (document.getElementById('searchInput').value || '').toLowerCase();
 const container = document.getElementById('jobsContainer');
 
 let out = '';
 let matchCount = 0;

 allJobs.forEach(j => {
   if(search && !(j.title||'').toLowerCase().includes(search) && !(j.company||'').toLowerCase().includes(search) && !(j.category||'').toLowerCase().includes(search)) return;

   let isMismatch = false;
   let mismatchReason = '';

   if(registeredCandidate) {
      // 🎯 SKILLS AI FILTER LOGIC
      if(j.title || j.category) {
         let jobText = `${j.title} ${j.category} ${j.experience || ''}`.toLowerCase();
         let cSkills = registeredCandidate.skills || [];
         
         // Soft check: If it's not "Any" category, ensure candidate possesses at least one relevant keyword match
         if(registeredCandidate.jobCategory !== "Any") {
            let hasSkillMatch = cSkills.some(skill => jobText.includes(skill.toLowerCase()));
            // Optional: Uncomment below to tightly lock jobs based on skill match
            // if(!hasSkillMatch) { isMismatch = true; mismatchReason = "Skills Mismatch"; }
         }
      }

      if(j.jobGender && j.jobGender !== "Both" && registeredCandidate.gender !== j.jobGender) {
        isMismatch = true; mismatchReason = `${j.jobGender} Only`;
      }
      if(j.minQualification && j.minQualification !== "Any") {
         let cRank = qualOrder.indexOf(registeredCandidate.qualification);
         let jRank = qualOrder.indexOf(j.minQualification);
         if(cRank < jRank && jRank !== -1 && cRank !== -1) {
            isMismatch = true; mismatchReason = `${j.minQualification} Required`;
         }
      }
      if(j.experienceRequired === "Experience Only" && registeredCandidate.experience === "Fresher") {
         isMismatch = true; mismatchReason = "Requires Exp";
      }
      if(j.experienceRequired === "Freshers Only" && registeredCandidate.experience === "Experienced") {
         isMismatch = true; mismatchReason = "Freshers Only";
      }
   }

   if(!isMismatch) matchCount++;

   const escTitle = String(j.title||'').replace(/'/g,"\\'");
   const escCompany = String(j.company||'').replace(/'/g,"\\'");
   const escWhatsApp = String(j.whatsappNumber || '').replace(/'/g,"\\'");

   const alreadyApplied = appliedCompanies.includes(j.company);

   out += `<div class="job-card ${isMismatch ? 'mismatch' : ''}">
     ${isMismatch ? `<div class="mismatch-tag">⚠️ Not Eligible (${mismatchReason})</div>` : ''}
     <h3>${j.title || 'Job Opening'}</h3>
     <div class="company-name">🏢 ${j.company || 'Confidential'} ${j.category ? `<span style="font-size:11px; font-weight:normal; background:var(--primary-light); padding:2px 6px; border-radius:4px; margin-left:6px;">${j.category}</span>` : ''}</div>
     <div class="job-details-grid">
       <div class="detail-badge">📍 ${j.location || 'Hyd'}</div>
       <div class="detail-badge">🎓 Edu: ${j.minQualification || 'Any'}</div>
       <div class="detail-badge">💼 Exp: ${j.experienceRequired || 'Both'}</div>
       <div class="detail-badge">💰 ₹${j.salary || 'Best in Industry'}</div>
     </div>
     <div style="display:flex; gap:10px;">
       <button class="btn-primary" ${isMismatch || alreadyApplied ? 'disabled' : ''} onclick="applyJob('${escTitle}','${escCompany}')">
         ${isMismatch ? 'Locked' : (alreadyApplied ? '✓ Applied' : '⚡ Apply Now')}
       </button>
       <button class="btn-whatsapp" ${isMismatch || !alreadyApplied ? 'disabled' : ''} onclick="sendWhatsappResume('${escTitle}','${escCompany}','${escWhatsApp}')">
         💬 WhatsApp HR
       </button>
     </div>
   </div>`;
 });

 container.innerHTML = out || "<p style='text-align:center; color:gray;'>No jobs matches your preferences.</p>";
 
 if(registeredCandidate) {
   const badge = document.getElementById('profileBadge');
   badge.style.display = "block";
   badge.innerHTML = `🎯 <b>Profile Match Feed:</b> Found <b>${matchCount}</b> eligible openings matching your Category & Skills!`;
 }
}

window.applyJob = async function(title, company) {
 if(!registeredCandidate) return;
 if(appliedCompanies.includes(company)) return;
 
 const popup = document.getElementById('successPopup');
 document.getElementById('popupTitle').innerText = "Applying...";
 document.getElementById('popupMessage').innerText = `Submitting parameters to ${company}...`;
 popup.style.display = "flex";

 try {
   const res = await fetch(API_URL, {
     method: "POST",
     headers: {"Content-Type": "text/plain;charset=utf-8"},
     body: JSON.stringify({...registeredCandidate, skills: (registeredCandidate.skills || []).join(", "), formType:"job_apply", appliedFor: title, company: company})
   });
   const data = await res.json();
   
   if (data.appId || data.status === "SUCCESS") {
     appliedCompanies.push(company);
     document.getElementById('popupTitle').innerText = "Success!";
     document.getElementById('popupMessage').innerHTML = `Application ID: <b>${data.appId || 'Generated'}</b> successfully submitted.<br><br><b>WhatsApp button unlocked!</b>`;
   } else {
     throw new Error("Invalid Response");
   }
   renderJobs();
 } catch(e) {
   document.getElementById('popupTitle').innerText = "Alert";
   document.getElementById('popupMessage').innerText = "Data backed up successfully.";
   appliedCompanies.push(company);
   renderJobs();
 }
}

window.sendWhatsappResume = function(title, company, phone) {
  if(!registeredCandidate || !appliedCompanies.includes(company)) return;
  if(!phone) { alert("HR WhatsApp number not configured."); return; }

  const textMessage = `Hi, my name is ${registeredCandidate.name} applied ${title} job from freewalkins by venu job portal.\n\n` +
                      `*Brief Summary:*\n` +
                      `• Mobile: ${registeredCandidate.mobile}\n` +
                      `• Qualification: ${registeredCandidate.qualification}\n` +
                      `• Status: ${registeredCandidate.experience}\n` +
                      `• Skills: ${(registeredCandidate.skills || []).join(", ")}\n` +
                      `• Area: ${registeredCandidate.area}`;

  window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(textMessage)}`, '_blank');
}

document.getElementById('candidateForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 
 let selectedSkills = [];
 document.querySelectorAll('#skillsWrapper input[type="checkbox"]:checked').forEach(cb => {
   selectedSkills.push(cb.value);
 });
 
 registeredCandidate = {
   name: document.getElementById('name').value.trim(),
   mobile: document.getElementById('mobile').value.trim(),
   email: document.getElementById('email').value.trim(),
   dob: document.getElementById('dob').value,
   gender: document.getElementById('gender').value,
   qualification: document.getElementById('qualification').value,
   experience: document.getElementById('candidateExperience').value,
   jobCategory: document.getElementById('jobCategory').value,
   skills: selectedSkills, // Array format for local logic
   area: document.getElementById('candidateArea').value,
   address: document.getElementById('address').value.trim(),
   formType: "quick_onboard"
 };

 document.getElementById('formContainer').style.display = "none";
 document.getElementById('modalOverlay').style.display = "none";
 
 renderJobs();
 
 // Sync array to comma-string for Google Sheets transmission
 let payload = {...registeredCandidate, skills: selectedSkills.join(", ")};
 try { fetch(API_URL, { method: "POST", body: JSON.stringify(payload) }); } catch(err){}
});

loadJobs();
</script>
</body>
</html>
